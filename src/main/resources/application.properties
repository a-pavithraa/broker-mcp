spring.application.name=broker-mcp

# Default to stdio for local MCP clients.
spring.main.web-application-type=none
spring.main.banner-mode=off

# MCP Server Configuration
spring.ai.mcp.server.name=broker-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.stdio=true
logging.file.name=${user.home}/.broker-mcp/logs/server.log
logging.level.root=INFO
logging.level.com.broker=DEBUG

# Enable annotation scanning for @Tool methods
spring.ai.mcp.server.annotation-scanner.enabled=true
# MCP tool mode: readonly (default) or full
broker.tools.mode=${BROKER_TOOLS_MODE:readonly}
broker.stock-universe-path=${STOCK_UNIVERSE_PATH:classpath:stock-universe.csv}
broker.corporate-actions.seed-path=${BROKER_CORPORATE_ACTIONS_SEED_PATH:classpath:stock-corporate-actions.json}
broker.corporate-actions.store-path=${BROKER_CORPORATE_ACTIONS_STORE_PATH:${user.home}/.broker-mcp/stock-corporate-actions.json}

# Breeze
breeze.enabled=${BREEZE_ENABLED:false}

# Zerodha
zerodha.enabled=${ZERODHA_ENABLED:false}
zerodha.base-url=https://api.kite.trade
zerodha.tier=${ZERODHA_TIER:paid}
zerodha.instrument-cache.dir=${ZERODHA_CACHE_DIR:${user.home}/.broker-mcp}
zerodha.tradebook.import-root=${ZERODHA_TRADEBOOK_IMPORT_ROOT:${user.home}/.broker-mcp/imports}
zerodha.tradebook.store-path=${ZERODHA_TRADEBOOK_STORE_PATH:${user.home}/.broker-mcp/zerodha-tradebook.json}

# Composite broker defaults when both brokers are active
broker.composite.preferred-data-broker=${BROKER_PREFERRED_DATA_BROKER:zerodha}
broker.composite.default-order-broker=${BROKER_DEFAULT_ORDER_BROKER:zerodha}

# Broker-agnostic trading configuration
broker.trade-history-years=${BROKER_TRADE_HISTORY_YEARS:5}
broker.trade-exchanges=NSE,BSE
broker.sector-enrichment.enabled=${BROKER_SECTOR_ENRICHMENT:true}
broker.trading.enabled=${BROKER_TRADING_ENABLED:false}
broker.trading.max-order-value=${BROKER_MAX_ORDER_VALUE:5000}
broker.trading.log-path=${BROKER_TRADE_LOG_PATH:${user.home}/.broker-mcp/logs/trade-executions.log}

# Breeze API Configuration
breeze.base-url=https://api.icicidirect.com/breezeapi/api/v1
